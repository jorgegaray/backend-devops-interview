apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend-devops-interview.fullname" . }}
  labels:
    {{- include "backend-devops-interview.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
  selector:
    app: {{ include "backend-devops-interview.fullname" . }}
