name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_REPOSITORY: backend-devops-interview
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v5
      - name: Log in to container registry
        uses: docker/login-action@v5
        with:
          registry: ${{ secrets.REGISTRY_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.REGISTRY_SERVER }}/${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV
      - name: Validate Helm chart
        run: |
          helm lint helm
          helm template backend-devops-interview helm \
            --set image.repository=${{ secrets.REGISTRY_SERVER }}/${{ env.IMAGE_REPOSITORY }} \
            --set image.tag=${{ env.IMAGE_TAG }}
      - name: Deploy Helm release
        run: |
          helm upgrade --install backend-devops-interview helm \
            --namespace default \
            --create-namespace \
            --set image.repository=${{ secrets.REGISTRY_SERVER }}/${{ env.IMAGE_REPOSITORY }} \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --set image.pullPolicy=IfNotPresent
